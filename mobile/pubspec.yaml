name: firecloud_mobile
description: "FireCloud distributed storage - fully decentralized P2P"
publish_to: 'none'
version: 2042.0.0+2042

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # HTTP client (for P2P communication)
  dio: any
  
  # State management
  flutter_riverpod: any
  riverpod_annotation: any
  
  # Navigation
  go_router: any
  
  # Local storage
  shared_preferences: any
  path_provider: any
  
  # File operations
  file_picker: any
  
  # Cryptography
  crypto: any
  
  # Device info (for identity)
  device_info_plus: any
  
  # Animations
  flutter_animate: any
  
  # Google Auth
  google_sign_in: any
  firebase_core: any
  firebase_auth: any
  
  # Disk space detection
  disk_space_plus: any

  # Android foreground execution for provider nodes
  flutter_background: any
  
  # Keep device awake during transfers
  wakelock_plus: any
  
  # Windows system tray for background mode
  system_tray: any
  
  # Window management for minimize to tray
  window_manager: any
  
  # Utils
  intl: any
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^2.6.5
  build_runner: ^2.4.15

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  assets:
    - assets/branding/

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
