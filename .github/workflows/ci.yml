name: ci

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  python-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest -q

  flutter-android:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze Flutter code
        run: flutter analyze

      - name: Run Flutter tests
        run: flutter test

      - name: Build Android debug APK
        run: >-
          flutter build apk --debug
          --dart-define FIRECLOUD_SIGNALING_URL=https://signal.firecloud.app
          --dart-define FIRECLOUD_RELAY_URL=https://relay.firecloud.app

  tauri-build-matrix:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    defaults:
      run:
        working-directory: desktop

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Install desktop dependencies
        run: npm install

      - name: Build frontend assets
        run: npm run build

      - name: Compile Tauri Rust backend
        run: cargo check --manifest-path src-tauri/Cargo.toml

      - name: Build Linux bundle
        if: matrix.os == 'ubuntu-latest'
        run: npm run tauri:build -- --bundles deb

      - name: Build Windows bundle
        if: matrix.os == 'windows-latest'
        run: npm run tauri:build -- --bundles msi

      - name: Build macOS bundle
        if: matrix.os == 'macos-latest'
        run: npm run tauri:build -- --bundles dmg
